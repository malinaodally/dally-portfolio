    <style>
        /* --- Root Variables & Theme Definition --- */
        :root {
            --primary: #0F5132;
            --primary-light: #167347;
            --accent: #F9D96A;
            --accent-hover: #f7ce46;
            --bg-dark: #0B0F0C;
            --bg-surface: #121814;
            --bg-card: rgba(22, 34, 27, 0.6);
            --text-light: #F8F9FA;
            --text-muted: #A0AAB2;
            --border-glass: rgba(249, 217, 106, 0.15);
            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'Inter', sans-serif;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* --- Global Reset & Base Styles --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        ul {
            list-style: none;
        }

        img {
            max-width: 100%;
            display: block;
        }

        /* --- Reusable Components --- */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .section {
            padding: 100px 0;
            position: relative;
        }

        .section-title {
            font-family: var(--font-heading);
            font-size: 2.8rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        .section-title span {
            color: var(--accent);
        }

        /* Glassmorphism Card Style */
        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 30px;
            transition: var(--transition);
        }

        .glass-card:hover {
            transform: translateY(-5px);
            border-color: rgba(249, 217, 106, 0.4);
            box-shadow: 0 10px 30px rgba(15, 81, 50, 0.2);
        }

        /* Premium Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            font-weight: 500;
            font-size: 0.95rem;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background-color: var(--accent);
            color: var(--bg-dark);
            border: 1px solid var(--accent);
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(249, 217, 106, 0.25);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-light);
            border: 1px solid rgba(248, 249, 250, 0.3);
        }

        .btn-secondary:hover {
            background-color: rgba(248, 249, 250, 0.05);
            border-color: var(--text-light);
            transform: translateY(-2px);
        }

        /* Scroll Animation Utility Classes */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- Header & Navigation --- */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            transition: var(--transition);
            padding: 20px 0;
        }

        .header.scrolled {
            background-color: rgba(11, 15, 12, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 0;
            border-bottom: 1px solid rgba(249, 217, 106, 0.1);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-light);
            letter-spacing: 1px;
        }

        .logo span {
            color: var(--accent);
        }

        .nav-menu {
            display: flex;
            gap: 30px;
        }

        .nav-link {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            transition: var(--transition);
            position: relative;
            padding: 5px 0;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--accent);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background-color: var(--accent);
            transition: var(--transition);
        }

        .nav-link:hover::after, .nav-link.active::after {
            width: 100%;
        }

        .hamburger {
            display: none;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 1.5rem;
        }

        /* --- Hero Section --- */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding-top: 100px;

        }

        .hero-content {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .hero-headline {
            font-family: var(--font-heading);
            font-size: 4rem;
            line-height: 1.15;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .hero-subheadline {
            font-size: 1.25rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .hero-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        /* --- About Me Section --- */
        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 60px;
            align-items: center;
        }

        .about-image-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-glass);
        }

        .about-image-placeholder {
            width: 100%;
            height: 450px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--bg-surface) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--accent);
            gap: 15px;
        }

        .about-image-placeholder i {
            font-size: 4rem;
            opacity: 0.7;
        }

        .about-text h3 {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            margin-bottom: 20px;
            color: var(--text-light);
        }

        .about-text p {
            color: var(--text-muted);
            font-size: 1.05rem;
            margin-bottom: 30px;
        }

        /* --- Services Section --- */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .service-card i {
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 20px;
            display: inline-block;
        }

        .service-card h3 {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .service-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* --- Skills Section --- */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .skill-badge {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
